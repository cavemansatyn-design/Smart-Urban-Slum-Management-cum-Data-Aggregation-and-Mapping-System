<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">
  <rect width="600" height="200" fill="#F9FAFB"/>
  <text x="300" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#374151" text-anchor="middle">Citizen Reporting Flow</text>
  <rect x="50" y="60" width="90" height="50" fill="#DBEAFE" stroke="#2563EB" rx="4"/>
  <text x="95" y="90" font-family="Arial" font-size="11" fill="#1E40AF" text-anchor="middle">Discover</text>
  <rect x="170" y="60" width="90" height="50" fill="#DBEAFE" stroke="#2563EB" rx="4"/>
  <text x="215" y="90" font-family="Arial" font-size="11" fill="#1E40AF" text-anchor="middle">Report</text>
  <rect x="290" y="60" width="90" height="50" fill="#DBEAFE" stroke="#2563EB" rx="4"/>
  <text x="335" y="90" font-family="Arial" font-size="11" fill="#1E40AF" text-anchor="middle">Submit</text>
  <rect x="410" y="60" width="90" height="50" fill="#D1FAE5" stroke="#059669" rx="4"/>
  <text x="455" y="90" font-family="Arial" font-size="11" fill="#047857" text-anchor="middle">Confirm</text>
  <rect x="530" y="60" width="90" height="50" fill="#D1FAE5" stroke="#059669" rx="4"/>
  <text x="575" y="90" font-family="Arial" font-size="11" fill="#047857" text-anchor="middle">Track</text>
  <line x1="140" y1="85" x2="170" y2="85" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="260" y1="85" x2="290" y2="85" stroke="#9CA3AF" stroke-width="2"/>
  <line x1="380" y1="85" x2="410" y2="85" stroke="#9CA3AF" stroke-width="2"/>
  <line x1="500" y1="85" x2="530" y2="85" stroke="#9CA3AF" stroke-width="2"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#9CA3AF"/></marker></defs>
</svg>
